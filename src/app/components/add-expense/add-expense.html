<div class="container-fluid">
    <div class="row text-center p-5">
        <div class="col fs-1 fw-bold">
            Add Expense
        </div>
    </div>
    <div class="row justify-content-center">
        <div class="col col-md-8">
            <div class="card">
                <div class="card-body">
                    <form class="was-validated">
                        <label for="title-input" class="form-label">Title</label>
                        <input type="text" id="title-input" class="form-control" [(ngModel)]="titleInput" required name="title">
                        <div class="invalid-feedback">Please enter a title.</div>
                    </form>
                </div>
                <div class="card-body">
                    <form class="was-validated">
                    <label for="amount-input" class="form-label">Amount (dollars, rounded)</label>
                    <input type="number" id="amount-input" class="form-control" [(ngModel)]="amountInput" required name="amount">
                    <div class="invalid-feedback">Please enter an amount.</div>
                    </form>
                </div>
                <div class="card-body">
                    <label for="category-select">Category</label>
                    <select class="form-select" id="category-select" [(ngModel)]="categoryInput">
                        @for(category of expenseService.categories(); track $index) {
                        <option value="{{ category }}">{{ category }}</option>
                        }
                    </select>
                </div>
                <div class="card-body">
                    <button type="button" class="btn btn-primary text-align-center" (click)="addExpense()">Add
                        Expense</button>
                </div>
            </div>
        </div>
    </div>
</div>
